<style>
  :root {
    --black: #0a0a0a;
    --black-soft: #141210;
    --gold: #C9A84C;
    --gold-bright: #D4AF37;
    --cream: #F5F1E6;
    --line: rgba(201, 168, 76, 0.28);
    --muted: #a39a85;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--black);
    color: var(--cream);
    font-family: 'Source Sans 3', sans-serif;
    line-height: 1.5;
  }

  h1, h2, h3, .display {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  header {
    padding: 28px 20px 20px;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }

  header img {
    height: 56px;
    margin-bottom: 14px;
  }

  header h1 {
    font-size: 1.7rem;
    margin: 0 0 6px;
    color: var(--gold-bright);
  }

  header p {
    color: var(--muted);
    margin: 0;
    font-size: 0.95rem;
  }

  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 18px 60px;
  }

  .search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
  }

  .search-box input {
    flex: 1;
    padding: 14px 16px;
    background: var(--black-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--cream);
    font-size: 1rem;
    font-family: inherit;
  }

  .search-box input:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
  }

  .search-box button {
    padding: 14px 22px;
    background: var(--gold-bright);
    color: var(--black);
    border: none;
    border-radius: 6px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    transition: background 0.15s ease;
  }

  .search-box button:hover { background: var(--gold); }
  .search-box button:focus-visible,
  .search-box input:focus-visible { outline: 2px solid var(--gold-bright); outline-offset: 2px; }

  .hint {
    color: var(--muted);
    font-size: 0.85rem;
    margin: 0 0 36px;
  }

  .status {
    text-align: center;
    color: var(--muted);
    padding: 40px 10px;
    font-size: 0.95rem;
  }

  .status.error { color: #d98c6b; }

  section.group {
    margin-top: 38px;
  }

  .group-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .group-header .rule {
    flex: 1;
    height: 0;
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    height: 3px;
    opacity: 0.5;
  }

  .group-header h2 {
    font-size: 1.05rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--gold-bright);
    margin: 0;
    white-space: nowrap;
  }

  .card {
    background: var(--black-soft);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }

  .card h3 {
    font-size: 1.15rem;
    margin: 0;
    color: var(--cream);
  }

  .card .badge {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--gold-bright);
    border: 1px solid var(--gold);
    border-radius: 100px;
    padding: 3px 10px;
    white-space: nowrap;
  }

  .card .title {
    color: var(--muted);
    font-size: 0.95rem;
    margin: 4px 0 12px;
  }

  .card .contact {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    font-size: 0.88rem;
  }

  .card .contact a {
    color: var(--gold-bright);
    text-decoration: none;
  }

  .card .contact a:hover { text-decoration: underline; }

  footer {
    text-align: center;
    padding: 30px 20px;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--line);
  }
</style>

  <h1>Find Your Elected Officials</h1>
  <p>Enter your ZIP code to see who represents you locally and at the state level.</p>
</header>

<main>
  <div class="search-box">
    <input
      type="text"
      id="zipInput"
      placeholder="Enter ZIP code"
      inputmode="numeric"
      maxlength="5"
      aria-label="ZIP code"
    >
    <button id="searchBtn">Search</button>
  </div>
  <p class="hint">Example: 31313 for Liberty County</p>

  <div id="results"></div>
</main>

<footer>
  Power Action Committee &mdash; Georgia
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://anhhyowtlagqkzkctsfc.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_-k5_rZOUq-Jioz_KZdxhCg_dEzKUOoz';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const zipInput = document.getElementById('zipInput');
  const searchBtn = document.getElementById('searchBtn');
  const results = document.getElementById('results');

  const LEVEL_LABELS = { city: 'City', county: 'County', state: 'State' };
  const LEVEL_ORDER = ['city', 'county', 'state'];

  function showStatus(message, isError = false) {
    results.innerHTML = `<div class="status${isError ? ' error' : ''}">${message}</div>`;
  }

  function renderResults(officials) {
    if (!officials.length) {
      showStatus('No officials found for that ZIP code yet. Try another ZIP, or check back soon as we add more.');
      return;
    }

    const grouped = {};
    officials.forEach(o => {
      if (!grouped[o.level]) grouped[o.level] = [];
      grouped[o.level].push(o);
    });

    results.innerHTML = '';

    LEVEL_ORDER.forEach(level => {
      if (!grouped[level]) return;

      const section = document.createElement('section');
      section.className = 'group';

      const header = document.createElement('div');
      header.className = 'group-header';
      header.innerHTML = `<h2>${LEVEL_LABELS[level]}</h2><div class="rule"></div>`;
      section.appendChild(header);

      grouped[level].forEach(o => {
        const card = document.createElement('div');
        card.className = 'card';

        const contactBits = [];
        if (o.phone) contactBits.push(`<a href="tel:${o.phone}">${o.phone}</a>`);
        if (o.email) contactBits.push(`<a href="mailto:${o.email}">${o.email}</a>`);
        if (o.website_url) contactBits.push(`<a href="${o.website_url}" target="_blank" rel="noopener">Website</a>`);

        card.innerHTML = `
          <div class="card-top">
            <h3>${o.full_name}</h3>
            ${o.party ? `<span class="badge">${o.party}</span>` : ''}
          </div>
          <div class="title">${o.office_title}${o.district ? ' &mdash; ' + o.district : ''}</div>
          ${contactBits.length ? `<div class="contact">${contactBits.join('')}</div>` : ''}
        `;
        section.appendChild(card);
      });

      results.appendChild(section);
    });
  }

  async function searchByZip() {
    const zip = zipInput.value.trim();

    if (!/^\d{5}$/.test(zip)) {
      showStatus('Enter a valid 5-digit ZIP code.', true);
      return;
    }

    showStatus('Searching…');

    const { data, error } = await supabase
      .from('officials')
      .select('*')
      .contains('zip_codes', [zip]);

    if (error) {
      console.error(error);
      showStatus('Something went wrong loading officials. Please try again.', true);
      return;
    }

    renderResults(data);
  }

  searchBtn.addEventListener('click', searchByZip);
  zipInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') searchByZip();
  });
</script>

<button id="pac-chat-launcher" onclick="pacChatToggle(true)">💬 Ask PAC</button>

<div id="pac-chat-panel">
  <div id="pac-chat-header">
    <span>Justice &amp; Reform GA</span>
    <button id="pac-chat-close" onclick="pacChatToggle(false)">&times;</button>
  </div>
  <div id="pac-chat-messages"></div>
  <div id="pac-chat-suggestions"></div>
  <div id="pac-chat-inputrow">
    <input id="pac-chat-input" type="text" placeholder="Ask a question..." />
    <button id="pac-chat-send" onclick="pacChatSend()">➤</button>
  </div>
</div>

<script>
  // ---- Edit this block to match your actual pages/content ----
  const PAC_FAQ = [
    {
      keywords: ["sign up", "signup", "create account", "register", "join"],
      answer: "You can create an account on the Sign Up page — click 'Join Power Action' and fill in your name, email, and password.",
      link: "signup.html", linkText: "Go to Sign Up"
    },
    {
      keywords: ["login", "log in", "sign in"],
      answer: "Head to the Login page and enter the email and password you signed up with.",
      link: "login.html", linkText: "Go to Login"
    },
    {
      keywords: ["bill", "bills", "legislation", "law"],
      answer: "The Bills page tracks current Georgia legislation using live data from Open States, searchable by keyword.",
      link: "bills.html", linkText: "View Bills"
    },
    {
      keywords: ["rep", "reps", "representative", "official", "senator", "zip"],
      answer: "The Officials page lets you look up your elected representatives by ZIP code, from city to federal level.",
      link: "officials.html", linkText: "Find Your Reps"
    },
    {
      keywords: ["forum", "discussion", "comment", "post", "thread"],
      answer: "The Forum is where members discuss bills and civic topics. You'll need an account to post.",
      link: "forum.html", linkText: "Visit Forum"
    },
    {
      keywords: ["blog", "news", "article"],
      answer: "The Blog has posts and updates from the PAC — anyone can read, admins publish.",
      link: "blog.html", linkText: "Read Blog"
    },
    {
      keywords: ["contributor", "role", "member vs contributor", "permission"],
      answer: "Members can read and follow bills. Contributors can also post and comment in the forum and blog. You pick your role at signup.",
    },
    {
      keywords: ["password", "requirement", "reset"],
      answer: "Passwords need at least 8 characters, one uppercase letter, one lowercase letter, and one number. There's no password reset page yet — contact an admin if you're locked out.",
    },
    {
      keywords: ["what is this", "what does this site do", "about", "mission", "purpose"],
      answer: "Power Action Committee / Justice & Reform Georgia is a civic engagement platform — track state bills, find your representatives, and join the discussion.",
    }
  ];

  const PAC_FALLBACK = "I'm not sure about that one yet — try asking about signing up, bills, your representatives, or the forum. You can also browse the site directly using the menu.";
  const PAC_SUGGESTED_CHIPS = ["How do I sign up?", "Find my reps", "What's on the Bills page?", "What's the forum?"];
  // ---------------------------------------------------------------

  let pacChatStarted = false;

  function pacChatToggle(open) {
    document.getElementById('pac-chat-panel').classList.toggle('open', open);
    if (open && !pacChatStarted) {
      pacChatStarted = true;
      pacChatRender('assistant', "Hi — I can point you to the right page or answer quick questions about how this site works. What do you need?");
      pacChatRenderChips();
    }
  }

  function pacChatRender(role, html) {
    const el = document.createElement('div');
    el.className = 'pac-msg ' + role;
    el.innerHTML = html;
    document.getElementById('pac-chat-messages').appendChild(el);
    const container = document.getElementById('pac-chat-messages');
    container.scrollTop = container.scrollHeight;
  }

  function pacChatRenderChips() {
    const box = document.getElementById('pac-chat-suggestions');
    box.innerHTML = '';
    PAC_SUGGESTED_CHIPS.forEach(function(q) {
      const chip = document.createElement('button');
      chip.className = 'pac-chip';
      chip.textContent = q;
      chip.onclick = function() { pacChatAsk(q); };
      box.appendChild(chip);
    });
  }

  function pacChatAnswer(query) {
    const q = query.toLowerCase();
    for (const item of PAC_FAQ) {
      if (item.keywords.some(function(k) { return q.includes(k); })) {
        let html = escapeHtml(item.answer);
        if (item.link) {
          html += ' <a href="' + item.link + '">' + item.linkText + ' &rarr;</a>';
        }
        return html;
      }
    }
    return escapeHtml(PAC_FALLBACK);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function pacChatAsk(text) {
    pacChatRender('user', escapeHtml(text));
    pacChatRender('assistant', pacChatAnswer(text));
  }

  function pacChatSend() {
    const input = document.getElementById('pac-chat-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    pacChatAsk(text);
  }

  document.getElementById('pac-chat-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') pacChatSend();
  });
      </script>
  

</body>
