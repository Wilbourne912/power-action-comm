<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | Power Action Comm</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: #222; padding: 2rem; border-radius: 10px; width: 300px; }
    h2 { text-align: center; margin-bottom: 1.5rem; }
    input { width: 100%; padding: 10px; margin-bottom: 1rem; border-radius: 5px; border: none; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #2ecc71; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
    #msg { margin-top: 1rem; text-align: center; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Join Power Action</h2>
    <input type="text" id="name" placeholder="Full Name" />
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="signUp()">Create Account</button>
    <div id="msg"></div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://anhhyowtlagqkzkctsfc.supabase.co',
      'sb_publishable_-k5_rZOUq-Jioz_KZdxhCg_dEzKUOoz'
    );

    async function signUp() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');

      const { error } = await supabase.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });

      if (error) {
        msg.style.color = 'red';
        msg.textContent = error.message;
      } else {
        msg.style.color = '#2ecc71';
        msg.textContent = 'Check your email to confirm your account!';
      }
    }
  </script>
</body>
</html>
