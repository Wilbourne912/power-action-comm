<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | Power Action Comm</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 2rem 0; box-sizing: border-box; }
    .box { background: #222; padding: 2rem; border-radius: 10px; width: 300px; }
    h2 { text-align: center; margin-bottom: 1.5rem; }
    input { width: 100%; padding: 10px; margin-bottom: 0.5rem; border-radius: 5px; border: none; box-sizing: border-box; }
    input.invalid { outline: 2px solid #e74c3c; }
    button { width: 100%; padding: 10px; background: #2ecc71; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; margin-top: 0.5rem; }
    button:disabled { background: #555; cursor: not-allowed; }
    #msg { margin-top: 1rem; text-align: center; font-size: 0.9rem; }
    .pw-requirements { font-size: 0.78rem; color: #aaa; margin: -0.2rem 0 1rem 0; line-height: 1.4; }
    .pw-requirements ul { margin: 0.3rem 0 0 0; padding-left: 1.1rem; }
    .pw-requirements li.met { color: #2ecc71; }
    .pw-requirements li.unmet { color: #e74c3c; }
    #confirm-msg { font-size: 0.78rem; margin: -0.3rem 0 1rem 0; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Join Power Action</h2>
    <input type="text" id="name" placeholder="Full Name" />
    <input type="email" id="email" placeholder="Email" />

    <input type="password" id="password" placeholder="Password" />
    <div class="pw-requirements">
      Password must contain:
      <ul id="pw-rules">
        <li id="rule-length" class="unmet">At least 8 characters</li>
        <li id="rule-upper" class="unmet">One uppercase letter</li>
        <li id="rule-lower" class="unmet">One lowercase letter</li>
        <li id="rule-number" class="unmet">One number</li>
      </ul>
    </div>

    <input type="password" id="confirm-password" placeholder="Confirm Password" />
    <div id="confirm-msg"></div>

    <div style="text-align:left; margin-bottom:1rem; font-size:0.85rem;">
      <label style="display:block; margin-bottom:0.3rem;">
        <input type="radio" name="role" value="member" checked /> Member
      </label>
      <label style="display:block;">
        <input type="radio" name="role" value="contributor" /> Contributor (can post & comment)
      </label>
    </div>

    <button id="submit-btn" onclick="signUp()">Create Account</button>

    <div id="msg"></div>

    <div style="text-align:center; margin-top:1rem; font-size:0.85rem;">
      <a href="index.html" style="color:#2ecc71; text-decoration:none;">&larr; Back to Home</a>
      &nbsp;|&nbsp;
      <a href="login.html" style="color:#2ecc71; text-decoration:none;">Already have an account? Log in</a>
    </div>
  </div>

  <script>
  let supabase;

  try {
    supabase = window.supabase.createClient(
      'https://anhhyowtlagqkzkctsfc.supabase.co',
      'sb_publishable_-k5_rZOUq-Jioz_KZdxhCg_dEzKUOoz'
    );
  } catch(e) {
    document.getElementById('msg').textContent = 'Init error: ' + e.message;
    document.getElementById('msg').style.color = 'red';
  }

  const pwInput = document.getElementById('password');
  const confirmInput = document.getElementById('confirm-password');
  const confirmMsg = document.getElementById('confirm-msg');

  function checkPasswordRules() {
    const val = pwInput.value;
    const rules = {
      'rule-length': val.length >= 8,
      'rule-upper': /[A-Z]/.test(val),
      'rule-lower': /[a-z]/.test(val),
      'rule-number': /[0-9]/.test(val)
    };
    let allMet = true;
    for (const [id, met] of Object.entries(rules)) {
      const el = document.getElementById(id);
      el.className = met ? 'met' : 'unmet';
      if (!met) allMet = false;
    }
    return allMet;
  }

  function checkConfirmMatch() {
    if (confirmInput.value.length === 0) {
      confirmMsg.textContent = '';
      confirmInput.classList.remove('invalid');
      return false;
    }
    const match = confirmInput.value === pwInput.value;
    confirmMsg.textContent = match ? 'Passwords match.' : 'Passwords do not match.';
    confirmMsg.style.color = match ? '#2ecc71' : '#e74c3c';
    confirmInput.classList.toggle('invalid', !match);
    return match;
  }

  pwInput.addEventListener('input', () => {
    checkPasswordRules();
    if (confirmInput.value.length > 0) checkConfirmMatch();
  });
  confirmInput.addEventListener('input', checkConfirmMatch);

  async function signUp() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = pwInput.value;
    const msg = document.getElementById('msg');
    const role = document.querySelector('input[name="role"]:checked').value;

    if (!name || !email) {
      msg.style.color = 'red';
      msg.textContent = 'Please fill in your name and email.';
      return;
    }

    if (!checkPasswordRules()) {
      msg.style.color = 'red';
      msg.textContent = 'Password does not meet the requirements above.';
      return;
    }

    if (!checkConfirmMatch()) {
      msg.style.color = 'red';
      msg.textContent = 'Passwords do not match.';
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    msg.style.color = 'yellow';
    msg.textContent = 'Creating account...';

    try {
      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { full_name: name, role: role } }
      });

      if (error) {
        msg.style.color = 'red';
        msg.textContent = 'Error: ' + error.message;
      } else {
        msg.style.color = '#2ecc71';
        msg.textContent = 'Check your email to confirm your account!';
      }
    } catch(e) {
      msg.style.color = 'red';
      msg.textContent = 'Caught: ' + e.message;
    } finally {
      btn.disabled = false;
    }
  }
  </script>
</body>
</html>
