<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Bills & Policies | Power Action Committee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --black-soft: #141210;
    --gold: #C9A84C;
    --gold-bright: #D4AF37;
    --cream: #F5F1E6;
    --line: rgba(201, 168, 76, 0.28);
    --muted: #a39a85;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--black);
    color: var(--cream);
    font-family: 'Source Sans 3', sans-serif;
    line-height: 1.5;
  }

  h1, h2, .display {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
  }

  header {
    padding: 20px;
    border-bottom: 1px solid var(--line);
    text-align: center;
  }

  .nav-row {
    text-align: left;
    margin-bottom: 14px;
  }

  .nav-row a {
    color: var(--gold-bright);
    text-decoration: none;
    font-weight: 600;
    margin-right: 18px;
  }

  header img { height: 50px; margin-bottom: 12px; }
  header h1 { font-size: 1.6rem; margin: 0 0 6px; color: var(--gold-bright); }
  header p { color: var(--muted); margin: 0; font-size: 0.92rem; }

  main { max-width: 640px; margin: 0 auto; padding: 26px 18px 60px; }

  .topic-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }

  .topic-btn {
    padding: 14px 10px;
    background: var(--black-soft);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--cream);
    font-family: inherit;
    font-size: 0.95rem;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .topic-btn:hover { border-color: var(--gold); }
  .topic-btn.active { background: var(--gold-bright); color: var(--black); font-weight: 700; border-color: var(--gold-bright); }
  .topic-btn:focus-visible { outline: 2px solid var(--gold-bright); outline-offset: 2px; }

  .status { text-align: center; color: var(--muted); padding: 40px 10px; font-size: 0.95rem; }
  .status.error { color: #d98c6b; }

  .bill-card {
    background: var(--black-soft);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }

  .bill-card .id-line {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--gold-bright);
    margin-bottom: 6px;
  }

  .bill-card h3 {
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    margin: 0 0 10px;
    color: var(--cream);
  }

  .bill-card a.bill-link {
    color: var(--gold-bright);
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 600;
  }

  .bill-card a.bill-link:hover { text-decoration: underline; }

  footer {
    text-align: center;
    padding: 30px 20px;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--line);
  }
</style>
</head>
<body>

<header>
  <div class="nav-row">
  <a href="javascript:history.back()">&larr; Back</a>
  <a href="index.html">Home</a>
  <a href="dashboard.html">My Account</a>
  </div>
  <img src="https://i.ibb.co/ZpCgNvdM/download.webp" alt="Power Action Committee">
  <h1>Search Bills &amp; Policies</h1>
  <p>Browse recent Georgia legislation by topic.</p>
</header>

<main>
  <div class="topic-grid" id="topicGrid">
    <button class="topic-btn" data-subject="Education">Education</button>
    <button class="topic-btn" data-subject="Health">Health Care</button>
    <button class="topic-btn" data-subject="Agriculture">Agriculture</button>
    <button class="topic-btn" data-subject="Public Safety">Public Safety</button>
  </div>

  <div id="results">
    <div class="status">Pick a topic above to see recent Georgia bills.</div>
  </div>
</main>

<footer>
  Power Action Committee &mdash; Georgia &middot; Legislative data via Open States
</footer>

<script>
  const OPENSTATES_KEY = '3313e6ba-2b22-4c84-8872-c48feff4db72';
  const API_BASE = 'https://v3.openstates.org';

  const grid = document.getElementById('topicGrid');
  const results = document.getElementById('results');

  function showStatus(message, isError = false) {
    results.innerHTML = `<div class="status${isError ? ' error' : ''}">${message}</div>`;
  }

  function renderBills(bills) {
    if (!bills.length) {
      showStatus('No bills found for this topic right now. Try another topic.');
      return;
    }

    results.innerHTML = '';
    bills.forEach(bill => {
      const card = document.createElement('div');
      card.className = 'bill-card';

      const title = bill.title || 'Untitled bill';
      const identifier = bill.identifier || '';
      const session = bill.session || '';
      const link = bill.openstates_url || '#';

      card.innerHTML = `
        <div class="id-line">${identifier}${session ? ' &middot; ' + session : ''}</div>
        <h3>${title}</h3>
        <a class="bill-link" href="${link}" target="_blank" rel="noopener">View full bill &rarr;</a>
      `;
      results.appendChild(card);
    });
  }

  async function searchTopic(subject) {
  showStatus('Searching…');

  const url = `${API_BASE}/bills?jurisdiction=Georgia&q=${encodeURIComponent(subject)}&sort=latest_action_desc&per_page=10&apikey=${OPENSTATES_KEY}`;

  try {
    const res = await fetch(url, {
      headers: { 'X-API-KEY': OPENSTATES_KEY }
    });
    if (!res.ok) {
      throw new Error(`Request failed: ${res.status}`);
    }
    const data = await res.json();
    renderBills(data.results || []);
  } catch (err) {
    console.error(err);
    showStatus('Could not load bills right now. Please try again shortly.', true);
  }
  }

  grid.addEventListener('click', e => {
    const btn = e.target.closest('.topic-btn');
    if (!btn) return;

    grid.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    searchTopic(btn.dataset.subject);
  });
</script>

<style>
  #pac-chat-launcher {

    width: 36px; height: 36px; cursor: pointer; font-size: 1rem;
  }
</style>

<button id="pac-chat-launcher" onclick="pacChatToggle(true)">💬 Ask PAC</button>

<div id="pac-chat-panel">
  <div id="pac-chat-header">
    <span>Justice &amp; Reform GA</span>
    <button id="pac-chat-close" onclick="pacChatToggle(false)">&times;</button>
  </div>
  <div id="pac-chat-messages"></div>
  <div id="pac-chat-suggestions"></div>
  <div id="pac-chat-inputrow">
    <input id="pac-chat-input" type="text" placeholder="Ask a question..." />
    <button id="pac-chat-send" onclick="pacChatSend()">➤</button>
  </div>
</div>

<script>
  // ---- Edit this block to match your actual pages/content ----
  const PAC_FAQ = [
    {
      keywords: ["sign up", "signup", "create account", "register", "join"],
      answer: "You can create an account on the Sign Up page — click 'Join Power Action' and fill in your name, email, and password.",
      link: "signup.html", linkText: "Go to Sign Up"
    },
    {
      keywords: ["login", "log in", "sign in"],
      answer: "Head to the Login page and enter the email and password you signed up with.",
      link: "login.html", linkText: "Go to Login"
    },
    {
      keywords: ["bill", "bills", "legislation", "law"],
      answer: "The Bills page tracks current Georgia legislation using live data from Open States, searchable by keyword.",
      link: "bills.html", linkText: "View Bills"
    },
    {
      keywords: ["rep", "reps", "representative", "official", "senator", "zip"],
      answer: "The Officials page lets you look up your elected representatives by ZIP code, from city to federal level.",
      link: "officials.html", linkText: "Find Your Reps"
    },
    {
      keywords: ["forum", "discussion", "comment", "post", "thread"],
      answer: "The Forum is where members discuss bills and civic topics. You'll need an account to post.",
      link: "forum.html", linkText: "Visit Forum"
    },
    {
      keywords: ["blog", "news", "article"],
      answer: "The Blog has posts and updates from the PAC — anyone can read, admins publish.",
      link: "blog.html", linkText: "Read Blog"
    },
    {
      keywords: ["contributor", "role", "member vs contributor", "permission"],
      answer: "Members can read and follow bills. Contributors can also post and comment in the forum and blog. You pick your role at signup.",
    },
    {
      keywords: ["password", "requirement", "reset"],
      answer: "Passwords need at least 8 characters, one uppercase letter, one lowercase letter, and one number. There's no password reset page yet — contact an admin if you're locked out.",
    },
    {
      keywords: ["what is this", "what does this site do", "about", "mission", "purpose"],
      answer: "Power Action Committee / Justice & Reform Georgia is a civic engagement platform — track state bills, find your representatives, and join the discussion.",
    }
  ];

  const PAC_FALLBACK = "I'm not sure about that one yet — try asking about signing up, bills, your representatives, or the forum. You can also browse the site directly using the menu.";
  const PAC_SUGGESTED_CHIPS = ["How do I sign up?", "Find my reps", "What's on the Bills page?", "What's the forum?"];
  // ---------------------------------------------------------------

  let pacChatStarted = false;

  function pacChatToggle(open) {
    document.getElementById('pac-chat-panel').classList.toggle('open', open);
    if (open && !pacChatStarted) {
      pacChatStarted = true;
      pacChatRender('assistant', "Hi — I can point you to the right page or answer quick questions about how this site works. What do you need?");
      pacChatRenderChips();
    }
  }

  function pacChatRender(role, html) {
    const el = document.createElement('div');
    el.className = 'pac-msg ' + role;
    el.innerHTML = html;
    document.getElementById('pac-chat-messages').appendChild(el);
    const container = document.getElementById('pac-chat-messages');
    container.scrollTop = container.scrollHeight;
  }

  function pacChatRenderChips() {
    const box = document.getElementById('pac-chat-suggestions');
    box.innerHTML = '';
    PAC_SUGGESTED_CHIPS.forEach(function(q) {
      const chip = document.createElement('button');
      chip.className = 'pac-chip';
      chip.textContent = q;
      chip.onclick = function() { pacChatAsk(q); };
      box.appendChild(chip);
    });
  }

  function pacChatAnswer(query) {
    const q = query.toLowerCase();
    for (const item of PAC_FAQ) {
      if (item.keywords.some(function(k) { return q.includes(k); })) {
        let html = escapeHtml(item.answer);
        if (item.link) {
          html += ' <a href="' + item.link + '">' + item.linkText + ' &rarr;</a>';
        }
        return html;
      }
    }
    return escapeHtml(PAC_FALLBACK);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function pacChatAsk(text) {
    pacChatRender('user', escapeHtml(text));
    pacChatRender('assistant', pacChatAnswer(text));
  }

  function pacChatSend() {
    const input = document.getElementById('pac-chat-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    pacChatAsk(text);
  }

  document.getElementById('pac-chat-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') pacChatSend();
  });
</script>
  
</body>
