<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum | Justice & Reform Georgia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #eaeaea;
    font-family: 'Source Sans Pro', sans-serif;
    margin: 0;
    padding: 0 16px 60px;
  }
  h1, h2, h3 { font-family: 'Playfair Display', serif; color: #D4AF37; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid #333;
    flex-wrap: wrap;
    gap: 10px;
  }
  header .logo img { height: 36px; }
  #guest-btns, #user-menu { display: flex; gap: 10px; align-items: center; }
  #user-menu { display: none; }
  .btn {
    background: #D4AF37;
    color: #0a0a0a;
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    font-size: 0.9rem;
  }
  .btn-outline {
    background: transparent;
    color: #D4AF37;
    border: 1px solid #D4AF37;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .thread-card {
    background: #1c1c1c;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 12px;
    cursor: pointer;
  }
  .thread-card.pinned { border-left: 3px solid #D4AF37; }
  .thread-meta { font-size: 0.85em; color: #999; margin-top: 6px; }
  .comment {
    background: #1c1c1c;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 10px;
  }
  textarea, input[type="text"] {
    width: 100%;
    background: #141414;
    color: #eaeaea;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 10px;
    font-family: inherit;
    margin-bottom: 10px;
  }
  #new-thread-form, #comment-form { display: none; margin-top: 20px; }
  .back-link { color: #D4AF37; cursor: pointer; display: inline-block; margin-bottom: 16px; }
  .delete-btn {
    background: transparent;
    color: #c0392b;
    border: 1px solid #c0392b;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 0.8em;
    cursor: pointer;
    margin-top: 8px;
  }
  #forum-thread-view { display: none; }
</style>
</head>
<body>

<header>
  <a class="logo" href="/index.html">
    <img src="https://i.ibb.co/ZpCgNvdM/download.webp" alt="PAC Logo">
  </a>
  <h2 style="margin:0;">Forum</h2>
  <div id="guest-btns">
    <a class="btn" href="/login.html">Log In</a>
  </div>
  <div id="user-menu">
    <span id="user-role-badge" style="color:#999; font-size:0.85em;"></span>
  </div>
</header>

<div id="forum-list-view">
  <button class="btn" id="show-new-thread-btn" style="display:none; margin-top:16px;">+ New Thread</button>

  <div id="new-thread-form">
    <input type="text" id="thread-title-input" placeholder="Thread title">
    <textarea id="thread-body-input" rows="4" placeholder="What is on your mind?"></textarea>
    <button class="btn" id="submit-thread-btn">Post Thread</button>
    <button class="btn-outline" id="cancel-thread-btn">Cancel</button>
  </div>

  <div id="thread-list"><p style="color:#999;">Loading threads...</p></div>
</div>

<div id="forum-thread-view">
  <span class="back-link" id="back-to-list">Back to all threads</span>
  <div id="thread-detail"></div>
  <h3>Replies</h3>
  <div id="comment-list"></div>

  <div id="comment-form">
    <textarea id="comment-body-input" rows="3" placeholder="Write a reply..."></textarea>
    <button class="btn" id="submit-comment-btn">Post Reply</button>
  </div>
  <p id="login-to-reply" style="color:#999; display:none;">Log in to join the discussion.</p>
</div>

<script>
var SUPABASE_URL = "https://anhhyowtlagqkzkctsfc.supabase.co";
var SUPABASE_KEY = "sb_publishable_-k5_rZOUq-Jioz_KZdxhCg_dEzKUOoz";
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var currentUser = null;
var currentRole = null;
var activeThreadId = null;

function escapeHtml(str) {
  var div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}

function truncate(str, len) {
  if (!str) return "";
  return str.length > len ? str.slice(0, len) + "..." : str;
}

function formatDate(iso) {
  var d = new Date(iso);
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

async function initAuth() {
  var res = await supabase.auth.getUser();
  var user = res.data.user;
  currentUser = user;

  if (user) {
    document.getElementById("guest-btns").style.display = "none";
    document.getElementById("user-menu").style.display = "flex";

    var memberRes = await supabase.from("members").select("role, full_name").eq("id", user.id).single();
    var memberRow = memberRes.data;

    currentRole = memberRow ? memberRow.role : "member";

    var badgeText = memberRow ? (memberRow.full_name + " (" + currentRole + ")") : "";
    document.getElementById("user-role-badge").textContent = badgeText;

    document.getElementById("show-new-thread-btn").style.display = "inline-block";
    document.getElementById("comment-form").style.display = "block";
    document.getElementById("login-to-reply").style.display = "none";
  } else {
    document.getElementById("comment-form").style.display = "none";
    document.getElementById("login-to-reply").style.display = "block";
  }
}

async function getAuthorNames(ids) {
  var uniqueIds = [];
  for (var i = 0; i < ids.length; i++) {
    if (uniqueIds.indexOf(ids[i]) === -1) uniqueIds.push(ids[i]);
  }
  if (uniqueIds.length === 0) return {};

  var res = await supabase.from("members").select("id, full_name").in("id", uniqueIds);
  var data = res.data || [];
  var map = {};
  for (var j = 0; j < data.length; j++) {
    map[data[j].id] = data[j].full_name;
  }
  return map;
}

async function loadThreadList() {
  document.getElementById("forum-thread-view").style.display = "none";
  document.getElementById("forum-list-view").style.display = "block";
  activeThreadId = null;

  var res = await supabase.from("forum_threads").select("*").order("pinned", { ascending: false }).order("created_at", { ascending: false });
  var threads = res.data;
  var error = res.error;

  var listEl = document.getElementById("thread-list");

  if (error) {
    listEl.innerHTML = "<p style=\"color:#c0392b;\">Error loading threads.</p>";
    return;
  }

  if (!threads || threads.length === 0) {
    listEl.innerHTML = "<p style=\"color:#999;\">No threads yet. Be the first to post.</p>";
    return;
  }

  var authorIds = [];
  for (var i = 0; i < threads.length; i++) authorIds.push(threads[i].author_id);
  var authorMap = await getAuthorNames(authorIds);

  var html = "";
  for (var t = 0; t < threads.length; t++) {
    var thread = threads[t];
    var pinnedClass = thread.pinned ? " pinned" : "";
    var pinnedIcon = thread.pinned ? " (pinned)" : "";
    var authorName = authorMap[thread.author_id] || "Unknown";

    html += "<div class=\"thread-card" + pinnedClass + "\" onclick=\"openThread('" + thread.id + "')\">";
    html += "<h3 style=\"margin:0 0 6px;\">" + escapeHtml(thread.title) + pinnedIcon + "</h3>";
    html += "<p style=\"margin:0; color:#ccc;\">" + escapeHtml(truncate(thread.body, 120)) + "</p>";
    html += "<div class=\"thread-meta\">by " + escapeHtml(authorName) + " - " + formatDate(thread.created_at) + "</div>";
    html += "</div>";
  }

  listEl.innerHTML = html;
}

async function openThread(threadId) {
  activeThreadId = threadId;
  document.getElementById("forum-list-view").style.display = "none";
  document.getElementById("forum-thread-view").style.display = "block";

  var res = await supabase.from("forum_threads").select("*").eq("id", threadId).single();
  var thread = res.data;
  var error = res.error;

  if (error || !thread) {
    document.getElementById("thread-detail").innerHTML = "<p style=\"color:#c0392b;\">Thread not found.</p>";
    return;
  }

  var authorMap = await getAuthorNames([thread.author_id]);
  var authorName = authorMap[thread.author_id] || "Unknown";

  var deleteThreadBtn = "";
  if (currentRole === "admin") {
    deleteThreadBtn = "<button class=\"delete-btn\" onclick=\"deleteThread('" + thread.id + "')\">Delete Thread</button>";
  }

  var detailHtml = "";
  detailHtml += "<h1>" + escapeHtml(thread.title) + "</h1>";
  detailHtml += "<p>" + escapeHtml(thread.body) + "</p>";
  detailHtml += "<div class=\"thread-meta\">by " + escapeHtml(authorName) + " - " + formatDate(thread.created_at) + "</div>";
  detailHtml += deleteThreadBtn;

  document.getElementById("thread-detail").innerHTML = detailHtml;

  await loadComments(threadId);
}

async function loadComments(threadId) {
  var res = await supabase.from("forum_comments").select("*").eq("thread_id", threadId).order("created_at", { ascending: true });
  var comments = res.data;
  var error = res.error;

  var listEl = document.getElementById("comment-list");

  if (error) {
    listEl.innerHTML = "<p style=\"color:#c0392b;\">Error loading replies.</p>";
    return;
  }

  if (!comments || comments.length === 0) {
    listEl.innerHTML = "<p style=\"color:#999;\">No replies yet.</p>";
    return;
  }

  var authorIds = [];
  for (var i = 0; i < comments.length; i++) authorIds.push(comments[i].author_id);
  var authorMap = await getAuthorNames(authorIds);

  var html = "";
  for (var c = 0; c < comments.length; c++) {
    var comment = comments[c];
    var authorName = authorMap[comment.author_id] || "Unknown";
    var deleteBtn = currentRole === "admin" ? ("<button class=\"delete-btn\" onclick=\"deleteComment('" + comment.id + "')\">Delete</button>") : "";

    html += "<div class=\"comment\">";
    html += "<p style=\"margin:0;\">" + escapeHtml(comment.body) + "</p>";
    html += "<div class=\"thread-meta\">" + escapeHtml(authorName) + " - " + formatDate(comment.created_at) + "</div>";
    html += deleteBtn;
    html += "</div>";
  }

  listEl.innerHTML = html;
}

async function submitThread() {
  var title = document.getElementById("thread-title-input").value.trim();
  var body = document.getElementById("thread-body-input").value.trim();

  if (!title || !body) {
    alert("Please fill in both a title and body.");
    return;
  }

  var res = await supabase.from("forum_threads").insert({
    title: title,
    body: body,
    author_id: currentUser.id,
    pinned: false
  });

  if (res.error) {
    alert("Error posting thread: " + res.error.message);
    return;
  }

  document.getElementById("thread-title-input").value = "";
  document.getElementById("thread-body-input").value = "";
  document.getElementById("new-thread-form").style.display = "none";
  await loadThreadList();
}

async function submitComment() {
  var body = document.getElementById("comment-body-input").value.trim();
  if (!body) return;

  var res = await supabase.from("forum_comments").insert({
    thread_id: activeThreadId,
    body: body,
    author_id: currentUser.id
  });

  if (res.error) {
    alert("Error posting reply: " + res.error.message);
    return;
  }

  document.getElementById("comment-body-input").value = "";
  await loadComments(activeThreadId);
}

async function deleteThread(threadId) {
  if (!confirm("Delete this thread and all its replies?")) return;
  await supabase.from("forum_comments").delete().eq("thread_id", threadId);
  await supabase.from("forum_threads").delete().eq("id", threadId);
  await loadThreadList();
}

async function deleteComment(commentId) {
  if (!confirm("Delete this reply?")) return;
  await supabase.from("forum_comments").delete().eq("id", commentId);
  await loadComments(activeThreadId);
}

document.getElementById("show-new-thread-btn").addEventListener("click", function() {
  document.getElementById("new-thread-form").style.display = "block";
});
document.getElementById("cancel-thread-btn").addEventListener("click", function() {
  document.getElementById("new-thread-form").style.display = "none";
});
document.getElementById("submit-thread-btn").addEventListener("click", submitThread);
document.getElementById("submit-comment-btn").addEventListener("click", submitComment);
document.getElementById("back-to-list").addEventListener("click", loadThreadList);

initAuth();
loadThreadList();
</script>

</body>
</html>
