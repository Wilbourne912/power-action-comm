<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Member Dashboard | Power Action Comm</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #000; color: #fff; min-height: 100vh; }
    header { background: #000; border-bottom: 2px solid #c9a84c; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { color: #c9a84c; font-size: 1.2rem; }
    button.logout { background: transparent; border: 1px solid #c9a84c; color: #c9a84c; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
    .hero { text-align: center; padding: 3rem 1rem 1rem; }
    .hero h2 { color: #c9a84c; font-size: 2rem; margin-bottom: 0.5rem; }
    .hero p { color: #ccc; font-size: 1rem; }
    .cards { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.5rem; padding: 2rem; }
    .card { background: #111; border: 1px solid #c9a84c; border-radius: 10px; padding: 1.5rem; width: 280px; text-align: center; }
    .card h3 { color: #c9a84c; margin-bottom: 0.5rem; }
    .card p { color: #aaa; font-size: 0.9rem; margin-bottom: 1rem; }
    .card button { background: #c9a84c; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
    #status { text-align: center; padding: 1rem; color: #c9a84c; font-size: 0.9rem; }
  </style>
</head>
<body>

  <header>
    <h1>⚖️ Power Action Comm</h1>
    <button class="logout" onclick="logout()">Log Out</button>
  </header>

  <div class="hero">
    <h2>Welcome, <span id="username">Member</span></h2>
    <p>Fighting for justice in Georgia</p>
  </div>

  <div id="status"></div>

  <div class="cards">
    <div class="card">
      <h3>💳 Pay Dues</h3>
      <p>Keep your membership active by paying your dues.</p>
      <button onclick="payDues()">Pay Now</button>
    </div>
    <div class="card">
      <h3>📋 Membership Status</h3>
      <p>Your membership is active and in good standing.</p>
      <button onclick="alert('Member in good standing.')">View Status</button>
    </div>
    <div class="card">
      <h3>📣 Latest Updates</h3>
      <p>Stay informed on our latest campaigns and actions.</p>
      <button onclick="alert('Updates coming soon.')">View Updates</button>
    </div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://anhhyowtlagqkzkctsfc.supabase.co',
      'sb_publishable_-k5_rZOUq-Jioz_KZdxhCg_dEzKUOoz'
    );

    async function getUser() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        window.location.href = '/login.html';
        return;
      }
      const name = user.user_metadata?.full_name || user.email;
      document.getElementById('username').textContent = name;
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = '/login.html';
    }

    function payDues() {
  window.location.href = 'https://buy.stripe.com/test_bJe3cn23r4Ed0fT65g83C00';
    }

    getUser();
  </script>
</body>
</html>
